name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UPX
        run: |
          UPX_VERSION=4.2.4
          curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" | tar xJ
          sudo mv "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/upx

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -trimpath \
            -o dist/codex2api-linux-amd64 .
          upx --best dist/codex2api-linux-amd64

      - name: Build linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -trimpath \
            -o dist/codex2api-linux-arm64 .
          upx --best dist/codex2api-linux-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/codex2api-linux-amd64
            dist/codex2api-linux-arm64
          generate_release_notes: true
